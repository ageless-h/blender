name: windows-build-code-terminal

on:
  workflow_dispatch:
  push:
    branches:
      - code-terminal-editor

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          lfs: true

      - name: Pull repository LFS objects
        shell: pwsh
        run: git lfs pull

      - name: Configure Git for long paths
        shell: pwsh
        run: git config --system core.longpaths true

      - name: Ensure SVN available
        shell: pwsh
        run: |
          if (-not (Get-Command svn -ErrorAction SilentlyContinue)) {
            choco install svn -y
          }

      - name: Fetch Windows external libraries
        shell: pwsh
        run: |
          git submodule sync --recursive
          git -c submodule."lib/windows_x64".update=checkout submodule update --init lib/windows_x64
          git -C lib/windows_x64 lfs pull

      - name: Build release with ninja
        shell: cmd
        run: make.bat release 2022 x64 ninja

      - name: Archive build output
        shell: pwsh
        run: |
          $out = "windows-code-terminal-${{ github.sha }}.zip"
          $candidates = @(
            "..\\build_windows_Release_x64_vc17_Release\\bin",
            "..\\build_windows_x64_vc17_Release\\bin"
          )
          $src = $null
          foreach ($p in $candidates) {
            if (Test-Path $p) { $src = $p; break }
          }
          if (-not $src) {
            Write-Error "Could not find built bin directory"
          }
          Compress-Archive -Path "$src\\*" -DestinationPath $out -Force
          Write-Output "ARCHIVE=$out" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-code-terminal
          path: ${{ env.ARCHIVE }}
          if-no-files-found: error
